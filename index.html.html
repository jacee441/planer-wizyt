<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Wizyty">
<meta name="theme-color" content="#0a3d2e">
<title>Planer Wizyt</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --green-deep: #0a3d2e;
    --green-mid: #1a6b4e;
    --green-bright: #2dc98a;
    --green-pale: #e8f7f1;
    --green-muted: #b0d9c8;
    --cream: #f5f2eb;
    --ink: #1a1a18;
    --ink-light: #5a5a55;
    --ink-faint: #9a9a94;
    --white: #ffffff;
    --checked: #1a6b4e;
    --row-done: #e8f7f1;
    --border: rgba(10,61,46,0.12);
    --border-strong: rgba(10,61,46,0.25);
    --red: #b03020;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--cream); font-family: 'DM Sans', sans-serif; color: var(--ink); overscroll-behavior: none; }

  /* ── HEADER ── */
  .header { background: var(--green-deep); padding: 12px 16px 16px; padding-top: max(env(safe-area-inset-top,0px),12px); position: sticky; top: 0; z-index: 100; }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .app-title { font-size: 11px; font-weight: 500; letter-spacing: 0.14em; text-transform: uppercase; color: var(--green-muted); font-family: 'DM Mono', monospace; }
  .week-btn { font-family: 'DM Mono',monospace; font-size: 12px; color: var(--green-bright); background: rgba(45,201,138,0.12); border: 1px solid rgba(45,201,138,0.3); border-radius: 6px; padding: 5px 10px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .week-display { font-size: 18px; font-weight: 300; color: var(--white); margin-bottom: 12px; }
  .week-display span { color: var(--green-bright); font-weight: 500; }
  .stats { display: grid; grid-template-columns: repeat(3,1fr); background: rgba(255,255,255,0.06); border-radius: 10px; overflow: hidden; border: 1px solid rgba(255,255,255,0.1); }
  .stat { padding: 10px 12px; text-align: center; border-right: 1px solid rgba(255,255,255,0.08); }
  .stat:last-child { border-right: none; }
  .stat-val { font-family: 'DM Mono',monospace; font-size: 22px; font-weight: 500; color: var(--white); line-height: 1; }
  .stat-val.hi { color: var(--green-bright); }
  .stat-lbl { font-size: 10px; color: var(--green-muted); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 3px; }

  /* ── EDIT BANNER ── */
  .edit-banner { display: none; background: #fff0ee; border-bottom: 1px solid rgba(176,48,32,0.2); color: var(--red); font-size: 12px; font-weight: 500; text-align: center; padding: 7px 16px; }
  body.edit-mode .edit-banner { display: block; }

  /* ── GRID ──
     The grid ALWAYS has 9 columns:
       [handle 0px→24px] [name 1fr] [day×6 36px each] [last 28px]
     In normal mode: handle col = 0px, last col shows "remaining"
     In edit mode:   handle col = 24px, last col shows del-btn
     The handle element is always in the DOM but overflows hidden at 0px width.
  */
  .row-grid {
    display: grid;
    grid-template-columns: 0px minmax(0,1fr) repeat(6,36px) 28px;
    gap: 3px;
    align-items: center;
  }
  body.edit-mode .row-grid {
    grid-template-columns: 24px minmax(0,1fr) repeat(6,36px) 28px;
  }

  .col-header { padding: 8px 8px 4px; position: sticky; top: 0; background: var(--cream); z-index: 10; }
  .col-day { font-family: 'DM Mono',monospace; font-size: 10px; font-weight: 500; text-align: center; color: var(--ink-faint); letter-spacing: 0.05em; line-height: 1.3; }
  .col-day-name { font-size: 10px; }
  .col-day-date { font-size: 9px; color: var(--green-mid); margin-top: 1px; }

  .patient { padding: 4px 8px; border-radius: 10px; margin-bottom: 2px; transition: background 0.2s, opacity 0.15s; user-select: none; }
  .patient.all-done { background: var(--row-done); }
  body.edit-mode .patient { border: 1px dashed rgba(176,48,32,0.15); }
  .patient.dragging { opacity: 0.3; }
  .patient.drop-above { border-top: 3px solid var(--green-bright) !important; }

  /* drag handle — always in DOM, clipped to 0px in normal mode */
  .drag-handle {
    width: 24px; height: 34px; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-faint); font-size: 15px;
    cursor: grab; touch-action: none;
    opacity: 0; transition: opacity 0.15s;
  }
  body.edit-mode .drag-handle { opacity: 1; }

  /* patient info */
  .patient-info { min-width: 0; }
  .patient-num { font-family: 'DM Mono',monospace; font-size: 9px; color: var(--ink-faint); line-height: 1; }
  .patient-name { font-size: 13px; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; }
  .patient.all-done .patient-name { color: var(--checked); font-weight: 500; }

  /* checkboxes */
  .chk { width: 36px; height: 34px; border-radius: 7px; border: 1.5px solid var(--border); background: var(--white); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background 0.15s, border-color 0.15s, transform 0.1s; flex-shrink: 0; }
  .chk:active { transform: scale(0.88); }
  .chk.on { background: var(--green-deep); border-color: var(--green-deep); }
  .chk.on::after { content: ''; display: block; width: 10px; height: 6px; border-left: 2px solid var(--green-bright); border-bottom: 2px solid var(--green-bright); transform: rotate(-45deg) translateY(-1px); }
  body.edit-mode .chk { pointer-events: none; opacity: 0.4; }

  /* last column: remaining (normal) ↔ del-btn (edit) */
  .remaining { font-family: 'DM Mono',monospace; font-size: 11px; text-align: center; color: var(--ink-faint); font-weight: 500; }
  .remaining.zero { color: var(--green-mid); font-size: 14px; }
  .del-btn { display: none; width: 26px; height: 26px; border-radius: 50%; border: none; background: var(--red); color: white; font-size: 14px; cursor: pointer; align-items: center; justify-content: center; margin: 0 auto; }
  body.edit-mode .remaining { display: none; }
  body.edit-mode .del-btn { display: flex; }

  /* floating drag clone */
  .drag-clone {
    position: fixed; z-index: 999; pointer-events: none;
    background: var(--white); box-shadow: 0 8px 24px rgba(10,61,46,0.22);
    border-radius: 10px; opacity: 0.95;
    display: grid; gap: 3px; align-items: center;
    grid-template-columns: 24px minmax(0,1fr) repeat(6,36px) 28px;
    padding: 4px 8px;
  }

  /* ── SCROLL ── */
  .scroll-area { padding: 4px 8px calc(80px + env(safe-area-inset-bottom,0px)); }

  /* ── BOTTOM BAR ── */
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--white); border-top: 1px solid var(--border); padding: 10px 12px; padding-bottom: calc(10px + env(safe-area-inset-bottom,0px)); display: flex; gap: 8px; align-items: center; z-index: 100; }
  .add-input { flex: 1; font-family: 'DM Sans',sans-serif; font-size: 14px; padding: 10px 14px; border: 1.5px solid var(--border-strong); border-radius: 10px; color: var(--ink); background: var(--cream); outline: none; min-width: 0; }
  .add-input:focus { border-color: var(--green-mid); }
  .add-input::placeholder { color: var(--ink-faint); }
  .add-btn { width: 44px; height: 44px; border-radius: 10px; border: none; background: var(--green-deep); color: var(--white); font-size: 24px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .edit-mode-btn { width: 44px; height: 44px; border-radius: 10px; border: 1.5px solid var(--border-strong); background: transparent; color: var(--ink-light); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.15s, border-color 0.15s, color 0.15s; }
  .edit-mode-btn.active { background: #fff0ee; border-color: var(--red); color: var(--red); }
  .reset-btn { width: 44px; height: 44px; border-radius: 10px; border: 1.5px solid var(--border-strong); background: transparent; color: var(--ink-light); font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }

  /* ── MODALS ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(10,61,46,0.7); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--white); border-radius: 20px 20px 0 0; width: 100%; max-width: 480px; padding: 20px 20px calc(20px + env(safe-area-inset-bottom,0px)); }
  .modal-title { font-size: 13px; font-weight: 500; color: var(--ink-light); margin-bottom: 14px; letter-spacing: 0.04em; text-transform: uppercase; }
  .modal input[type="date"] { width: 100%; font-family: 'DM Mono',monospace; font-size: 18px; padding: 12px 14px; border: 1.5px solid var(--border-strong); border-radius: 10px; color: var(--ink); background: var(--cream); margin-bottom: 12px; outline: none; }
  .modal-btns { display: flex; gap: 10px; }
  .btn-primary { flex: 1; padding: 13px; background: var(--green-deep); color: var(--white); border: none; border-radius: 10px; font-family: 'DM Sans',sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
  .btn-ghost { padding: 13px 18px; background: transparent; color: var(--ink-light); border: 1.5px solid var(--border-strong); border-radius: 10px; font-family: 'DM Sans',sans-serif; font-size: 15px; cursor: pointer; }
  .confirm-overlay { display: none; position: fixed; inset: 0; background: rgba(10,61,46,0.7); z-index: 300; align-items: center; justify-content: center; padding: 20px; }
  .confirm-overlay.open { display: flex; }
  .confirm-box { background: var(--white); border-radius: 16px; padding: 24px 20px; width: 100%; max-width: 320px; text-align: center; }
  .confirm-icon { font-size: 32px; margin-bottom: 12px; }
  .confirm-title { font-size: 17px; font-weight: 600; margin-bottom: 8px; }
  .confirm-sub { font-size: 14px; color: var(--ink-light); margin-bottom: 20px; line-height: 1.5; }
  .confirm-btns { display: flex; gap: 10px; }
  .btn-danger { flex: 1; padding: 13px; background: var(--red); color: var(--white); border: none; border-radius: 10px; font-family: 'DM Sans',sans-serif; font-size: 15px; font-weight: 500; cursor: pointer; }
  .install-hint { display: none; background: var(--green-deep); color: var(--green-pale); font-size: 12px; text-align: center; padding: 8px 16px; line-height: 1.6; }
  .install-hint b { color: var(--green-bright); }
</style>
</head>
<body>

<div class="edit-banner">Tryb edycji &mdash; przeciągnij ☰ aby zmienić kolejność &bull; ✕ aby usunąć</div>

<div class="confirm-overlay" id="uncheckModal">
  <div class="confirm-box">
    <div class="confirm-icon">⚠️</div>
    <div class="confirm-title">Usunąć znacznik?</div>
    <div class="confirm-sub" id="uncheckSub"></div>
    <div class="confirm-btns">
      <button class="btn-ghost" onclick="closeUncheck()">Anuluj</button>
      <button class="btn-danger" onclick="confirmUncheck()">Tak, usuń</button>
    </div>
  </div>
</div>

<div class="install-hint" id="installHint">
  Aby zainstalować: naciśnij <b>Udostępnij &#x2197;</b> &rarr; <b>Dodaj do ekranu głównego</b>
</div>

<div class="header">
  <div class="header-top">
    <div class="app-title">&#9679; Planer Wizyt</div>
    <button class="week-btn" onclick="openDateModal()">
      <svg width="12" height="12" viewBox="0 0 12 12" fill="none"><rect x="1" y="2" width="10" height="9" rx="1.5" stroke="currentColor" stroke-width="1.2"/><path d="M4 1v2M8 1v2M1 5h10" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
      Zmień tydzień
    </button>
  </div>
  <div class="week-display" id="weekDisplay"></div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="statTotal">0</div><div class="stat-lbl">Pacjenci</div></div>
    <div class="stat"><div class="stat-val hi" id="statDone">0</div><div class="stat-lbl">Odwiedzeni</div></div>
    <div class="stat"><div class="stat-val" id="statLeft">0</div><div class="stat-lbl">Pozostało</div></div>
  </div>
</div>

<div class="scroll-area">
  <div class="col-header row-grid" id="colHeader"></div>
  <div id="patientList"></div>
</div>

<div class="bottom-bar">
  <input class="add-input" id="newName" placeholder="Dodaj pacjenta..." type="text" autocomplete="off">
  <button class="add-btn" onclick="addPatient()">+</button>
  <button class="edit-mode-btn" id="editModeBtn" onclick="toggleEditMode()">✎</button>
  <button class="reset-btn" onclick="openConfirm()">&#8635;</button>
</div>

<div class="modal-overlay" id="dateModal" onclick="if(event.target===this)closeDateModal()">
  <div class="modal">
    <div class="modal-title">Wybierz datę tygodnia</div>
    <input type="date" id="dateInput">
    <div class="modal-btns">
      <button class="btn-ghost" onclick="closeDateModal()">Anuluj</button>
      <button class="btn-primary" onclick="applyDate()">Zapisz</button>
    </div>
  </div>
</div>

<div class="confirm-overlay" id="confirmModal" onclick="if(event.target===this)closeConfirm()">
  <div class="confirm-box">
    <div class="confirm-icon">&#128197;</div>
    <div class="confirm-title">Nowy tydzień</div>
    <div class="confirm-sub">Usunąć wszystkie znaczniki i zacząć nowy tydzień?</div>
    <div class="confirm-btns">
      <button class="btn-ghost" onclick="closeConfirm()">Anuluj</button>
      <button class="btn-danger" onclick="resetWeek()">Tak, resetuj</button>
    </div>
  </div>
</div>

<script>
const KEY = 'planer_v4';
const PL_MONTHS = ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'];
const DAY_NAMES = ['Pn','Wt','Śr','Cz','Pt','S'];
const DEFAULT_PATIENTS = [
  'Bernadetta Kubacka','Artur Koledziński','Stanisław Wach','Urszula Rolka',
  'Aneta Wołyniec','Artur Klim','Anna Świrydczuk','Joanna Kwiatkowska',
  'Bożena Krzewińska','Maria Bachmatiuk','Janina Pikulska','Czesław Sokołowski',
  'Kazimierz Domaracki','Krystyna Cisak','Anna Mekin','Halina Kwiecińska',
  'Teresa Rejno','Krystyna Jacyszyn','Ireneusz Pokorski'
];

function todayStr() { return new Date().toISOString().slice(0,10); }
function load() { try { const d = localStorage.getItem(KEY); return d ? JSON.parse(d) : null; } catch { return null; } }
function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch {} }

let state = load();
if (!state) {
  state = { week: todayStr(), patients: DEFAULT_PATIENTS.map(n => ({ name: n, days: Array(6).fill(false) })) };
  save();
}
state.patients.forEach(p => { while (p.days.length < 6) p.days.push(false); });

if (/iphone|ipad|ipod/i.test(navigator.userAgent) && !window.navigator.standalone)
  document.getElementById('installHint').style.display = 'block';

function formatWeek(str) {
  const [y,m,d] = str.split('-').map(Number);
  const mon = new Date(y,m-1,d), sat = new Date(mon);
  sat.setDate(mon.getDate()+5);
  return `${mon.getDate()} ${PL_MONTHS[mon.getMonth()]} do ${sat.getDate()} ${PL_MONTHS[sat.getMonth()]}`;
}

function getWeekDates(str) {
  const [y,m,d] = str.split('-').map(Number), mon = new Date(y,m-1,d);
  return Array.from({length:6}, (_,i) => { const dt = new Date(mon); dt.setDate(mon.getDate()+i); return dt; });
}

function render() {
  document.getElementById('weekDisplay').innerHTML = `Tydzień od <span>${formatWeek(state.week)}</span>`;

  // ── Column header (9 children to match 9-column grid) ──
  const header = document.getElementById('colHeader');
  header.innerHTML = '';
  header.appendChild(document.createElement('div')); // col 1: handle placeholder
  header.appendChild(document.createElement('div')); // col 2: name placeholder
  getWeekDates(state.week).forEach((dt, i) => {     // cols 3-8: days
    const cell = document.createElement('div');
    cell.className = 'col-day';
    cell.innerHTML = `<div class="col-day-name">${DAY_NAMES[i]}</div><div class="col-day-date">${dt.getDate()}.${String(dt.getMonth()+1).padStart(2,'0')}</div>`;
    header.appendChild(cell);
  });
  header.appendChild(document.createElement('div')); // col 9: rem/del placeholder

  // ── Patient rows (9 children each) ──
  const list = document.getElementById('patientList');
  list.innerHTML = '';
  let visited = 0;

  state.patients.forEach((p, pi) => {
    const cnt = p.days.filter(Boolean).length;
    if (cnt > 0) visited++;

    const row = document.createElement('div');
    row.className = 'patient row-grid' + (cnt === 6 ? ' all-done' : '');
    row.dataset.pi = pi;

    // col 1: drag handle (always present, 0px wide in normal mode)
    const handle = document.createElement('div');
    handle.className = 'drag-handle';
    handle.textContent = '☰';
    row.appendChild(handle);

    // col 2: name
    const info = document.createElement('div');
    info.className = 'patient-info';
    info.innerHTML = `<div class="patient-num">${pi+1}</div><div class="patient-name">${p.name}</div>`;
    row.appendChild(info);

    // cols 3-8: checkboxes
    p.days.forEach((checked, di) => {
      const btn = document.createElement('button');
      btn.className = 'chk' + (checked ? ' on' : '');
      btn.addEventListener('click', () => toggle(pi, di));
      row.appendChild(btn);
    });

    // col 9: remaining count
    const rem = document.createElement('div');
    rem.className = 'remaining' + (cnt === 6 ? ' zero' : '');
    rem.textContent = cnt === 6 ? '✓' : (6-cnt);
    row.appendChild(rem);

    // col 9 (edit mode): delete button — same slot, toggled by CSS
    const del = document.createElement('button');
    del.className = 'del-btn';
    del.textContent = '✕';
    del.addEventListener('click', () => deletePatient(pi));
    row.appendChild(del);

    list.appendChild(row);
  });

  document.getElementById('statTotal').textContent = state.patients.length;
  document.getElementById('statDone').textContent = visited;
  document.getElementById('statLeft').textContent = state.patients.length - visited;
}

// ── TOGGLE ──
let pendingUncheck = null;
function toggle(pi, di) {
  if (document.body.classList.contains('edit-mode')) return;
  if (state.patients[pi].days[di]) {
    pendingUncheck = {pi, di};
    document.getElementById('uncheckSub').textContent = `Usunąć wizytę u ${state.patients[pi].name} (${DAY_NAMES[di]})?`;
    document.getElementById('uncheckModal').classList.add('open');
  } else {
    state.patients[pi].days[di] = true;
    save(); render();
  }
}
function closeUncheck() { pendingUncheck = null; document.getElementById('uncheckModal').classList.remove('open'); }
function confirmUncheck() {
  if (pendingUncheck) { state.patients[pendingUncheck.pi].days[pendingUncheck.di] = false; save(); render(); }
  closeUncheck();
}

// ── EDIT MODE ──
function toggleEditMode() {
  document.body.classList.toggle('edit-mode');
  const on = document.body.classList.contains('edit-mode');
  const btn = document.getElementById('editModeBtn');
  btn.classList.toggle('active', on);
  btn.textContent = on ? '✓' : '✎';
}
function deletePatient(pi) {
  if (!confirm(`Usunąć pacjenta: ${state.patients[pi].name}?`)) return;
  state.patients.splice(pi, 1); save(); render();
}

// ── ADD ──
function addPatient() {
  const inp = document.getElementById('newName');
  const name = inp.value.trim();
  if (!name) return;
  state.patients.push({name, days: Array(6).fill(false)});
  inp.value = ''; save(); render();
}
document.getElementById('newName').addEventListener('keydown', e => { if (e.key==='Enter') addPatient(); });

// ── DATE MODAL ──
function openDateModal() { document.getElementById('dateInput').value = state.week; document.getElementById('dateModal').classList.add('open'); }
function closeDateModal() { document.getElementById('dateModal').classList.remove('open'); }
function applyDate() { const v = document.getElementById('dateInput').value; if (v) { state.week=v; save(); render(); } closeDateModal(); }

// ── RESET ──
function openConfirm() { document.getElementById('confirmModal').classList.add('open'); }
function closeConfirm() { document.getElementById('confirmModal').classList.remove('open'); }
function resetWeek() {
  state.patients.forEach(p => p.days = Array(6).fill(false));
  state.week = todayStr(); save(); render(); closeConfirm();
}

// ── DRAG TO REORDER (touch only) ──
let drag = null;
const list = document.getElementById('patientList');

list.addEventListener('touchstart', function(e) {
  if (!document.body.classList.contains('edit-mode')) return;
  const handle = e.target.closest('.drag-handle');
  if (!handle) return;
  e.preventDefault();

  const row = handle.closest('.patient');
  const t = e.touches[0];
  const rect = row.getBoundingClientRect();

  // Create a visual ghost that follows the finger
  const clone = document.createElement('div');
  clone.className = 'drag-clone';
  clone.style.top = rect.top + 'px';
  clone.style.left = rect.left + 'px';
  clone.style.right = (window.innerWidth - rect.right) + 'px';
  clone.style.height = rect.height + 'px';

  // Populate clone with same structure
  const pi = parseInt(row.dataset.pi);
  const p = state.patients[pi];
  const hEl = document.createElement('div'); hEl.style.cssText='display:flex;align-items:center;justify-content:center;color:#9a9a94;font-size:15px'; hEl.textContent='☰'; clone.appendChild(hEl);
  const iEl = document.createElement('div'); iEl.style.cssText='min-width:0'; iEl.innerHTML=`<div style="font-size:9px;color:#9a9a94">${pi+1}</div><div style="font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${p.name}</div>`; clone.appendChild(iEl);
  p.days.forEach(checked => {
    const c = document.createElement('div');
    c.style.cssText = `width:36px;height:34px;border-radius:7px;border:1.5px solid rgba(10,61,46,0.12);background:${checked?'#0a3d2e':'#fff'};flex-shrink:0`;
    clone.appendChild(c);
  });
  const rEl = document.createElement('div'); rEl.style.cssText='text-align:center;font-size:11px;color:#9a9a94'; const cnt=p.days.filter(Boolean).length; rEl.textContent=cnt===6?'✓':(6-cnt); clone.appendChild(rEl);

  document.body.appendChild(clone);

  drag = { row, clone, pi, offsetY: t.clientY - rect.top, dropTarget: null };
  row.classList.add('dragging');
}, {passive: false});

list.addEventListener('touchmove', function(e) {
  if (!drag) return;
  e.preventDefault();
  const y = e.touches[0].clientY;
  drag.clone.style.top = (y - drag.offsetY) + 'px';

  // Determine which non-dragging row we're above
  const rows = [...list.querySelectorAll('.patient:not(.dragging)')];
  let target = null;
  for (const r of rows) {
    const rect = r.getBoundingClientRect();
    if (y < rect.top + rect.height / 2) { target = r; break; }
  }

  if (drag.dropTarget !== target) {
    list.querySelectorAll('.drop-above').forEach(r => r.classList.remove('drop-above'));
    if (target) target.classList.add('drop-above');
    drag.dropTarget = target;
  }
}, {passive: false});

list.addEventListener('touchend', function() {
  if (!drag) return;
  drag.clone.remove();
  drag.row.classList.remove('dragging');
  list.querySelectorAll('.drop-above').forEach(r => r.classList.remove('drop-above'));

  const from = drag.pi;
  let to;
  if (drag.dropTarget) {
    to = parseInt(drag.dropTarget.dataset.pi);
    if (to > from) to--; // compensate for removal
  } else {
    to = state.patients.length - 1; // dropped past last row
  }
  drag = null;

  if (from !== to && to >= 0 && to < state.patients.length) {
    const [moved] = state.patients.splice(from, 1);
    state.patients.splice(to, 0, moved);
    save();
  }
  render();
});

render();
</script>
</body>
</html>
